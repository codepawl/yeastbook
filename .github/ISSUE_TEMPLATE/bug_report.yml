name: Bug Report
description: Report a bug in Yeastbook
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open a new notebook
        2. Type `const x = ...` in a cell
        3. Press Shift+Enter
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Yeastbook version
      description: Run `yeastbook --version` or check the About dialog
      placeholder: "0.0.1"
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Windows (native)
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser console errors, screenshots, notebook file, etc.
