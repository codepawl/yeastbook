  <!-- Shadow/base -->
  <ellipse cx="64" cy="108" rx="48" ry="8" fill="#8B6914" opacity="0.3"/>
  <!-- Loaf body (bottom crust) -->
  <path d="M18 100 C18 100 16 70 24 56 C30 46 42 38 64 38 C86 38 98 46 104 56 C112 70 110 100 110 100 C110 106 96 110 64 110 C32 110 18 106 18 100Z" fill="#C6872E"/>
  <!-- Top crust (golden dome) -->
  <path d="M22 68 C22 68 24 44 38 36 C48 30 56 28 64 28 C72 28 80 30 90 36 C104 44 106 68 106 68 C106 74 94 78 64 78 C34 78 22 74 22 68Z" fill="#E8A33C"/>
  <!-- Inner highlight -->
  <path d="M30 64 C30 64 32 48 42 42 C50 38 56 36 64 36 C72 36 78 38 86 42 C96 48 98 64 98 64 C98 68 88 70 64 70 C40 70 30 68 30 64Z" fill="#F0C060"/>
  <!-- Score lines (diagonal cuts on top of bread) -->
  <line x1="44" y1="44" x2="56" y2="62" stroke="#C6872E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="40" x2="68" y2="60" stroke="#C6872E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="76" y1="44" x2="82" y2="62" stroke="#C6872E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Shine highlight -->
  <path d="M40 48 C44 44 52 40 60 39" stroke="#F8DC90" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
