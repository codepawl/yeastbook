name: CD

on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build:ui && bun run build:embed
      - run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
      - run: npm publish --provenance --access public
        working-directory: packages/app

  publish-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: cd packages/vscode && bun install && bun run build && bun run package
      - run: bunx @vscode/vsce publish --no-dependencies -p ${{ secrets.VSCE_PAT }}
        working-directory: packages/vscode

  update-homebrew:
    runs-on: ubuntu-latest
    needs: [publish-npm]
    steps:
      - uses: actions/checkout@v4
      - name: Update Homebrew formula
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          SHA=$(curl -fsSL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz" | sha256sum | cut -d' ' -f1)
          echo "Version: $VERSION, SHA: $SHA"
          echo "TODO: Create/update homebrew-tap repo with formula"
